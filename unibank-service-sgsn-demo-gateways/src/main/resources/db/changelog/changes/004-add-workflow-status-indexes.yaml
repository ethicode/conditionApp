databaseChangeLog:
  - changeSet:
      id: 004-add-workflow-status-indexes
      author: copilot
      changes:
        - createIndex:
            tableName: demande_request
            indexName: idx_demande_request_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: demande_request
            indexName: idx_demande_request_actor
            columns:
              - column:
                  name: current_actor
        - createIndex:
            tableName: demande_request
            indexName: idx_demande_request_customer_ref
            columns:
              - column:
                  name: customer_reference
